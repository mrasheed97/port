[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173

[functions]
  node_bundler = "esbuild"

[functions."ai"]
  timeout = 26

[functions."finnhub"]
  timeout = 10

[functions."spot"]
  timeout = 10

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
